<!DOCTYPE html>
<html lang="fa" dir="rtl" id="htmlRoot">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PG Persian RTL Fix</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080c; --bg2:#0e0e16; --bg3:#151520; --bg4:#1b1b28;
  --border:#22222f; --border2:#2c2c3d;
  --p:#7c6fff; --p2:#5a4fff; --g:#3ecf8e; --g2:#2fa876;
  --text:#eae8f2; --text2:#9d9ab3; --text3:#5e5b78;
  --mono:'JetBrains Mono',monospace;
  --sans:'Vazirmatn',sans-serif;
}
html{scroll-behavior:smooth}
html[lang="en"]{ --sans:'Inter',sans-serif; }
body{
  background:var(--bg); color:var(--text);
  font-family:var(--sans);
  line-height:1.75;
  overflow-x:hidden;
}

.bg-glow{
  position:fixed; inset:0; z-index:-1; pointer-events:none;
  background:
    radial-gradient(ellipse 900px 500px at 15% -5%, #7c6fff22, transparent 60%),
    radial-gradient(ellipse 700px 500px at 90% 15%, #3ecf8e16, transparent 60%),
    radial-gradient(ellipse 800px 600px at 50% 100%, #7c6fff12, transparent 60%);
}

.wrap{ max-width:820px; margin:0 auto; padding:0 28px; }

/* ── LANG SWITCHER (fixed top) ───────────────────────────── */
.lang-bar{
  position:sticky; top:0; z-index:50;
  display:flex; justify-content:center; padding:14px 0;
  background:#08080cd0; backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}
.lang-pills{
  display:flex; gap:4px; background:var(--bg3);
  border:1px solid var(--border2); border-radius:10px; padding:4px;
}
.lang-pill{
  padding:6px 14px; border-radius:7px; border:none; background:transparent;
  color:var(--text3); font-family:var(--mono); font-size:11.5px; font-weight:600;
  letter-spacing:.5px; cursor:pointer; transition:all .15s;
}
.lang-pill:hover{ color:var(--text2); }
.lang-pill.active{
  background:linear-gradient(135deg,var(--p),var(--g)); color:#fff;
  box-shadow:0 2px 10px #7c6fff44;
}

/* ── HERO ─────────────────────────────────────────────── */
.hero{ padding:70px 0 56px; text-align:center; position:relative; }
.hero-badge{
  display:inline-flex; align-items:center; gap:7px;
  padding:6px 14px; border-radius:20px;
  background:#7c6fff14; border:1px solid #7c6fff33;
  font-size:12px; color:#a49fff; font-weight:600;
  margin-bottom:28px; letter-spacing:.3px;
}
.hero-badge .dot{ width:6px;height:6px;border-radius:50%;background:var(--g);
  box-shadow:0 0 8px #3ecf8e; animation:blink 2s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.logo-big{
  width:88px; height:88px; margin:0 auto 26px; border-radius:22px;
  background:linear-gradient(135deg,var(--p),var(--g));
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:34px; font-weight:800; color:#fff;
  box-shadow:0 20px 60px -10px #7c6fff55, 0 0 0 1px #ffffff14 inset;
}

.hero h1{
  font-size:38px; font-weight:800; letter-spacing:-0.5px;
  background:linear-gradient(135deg,#fff 30%,#c9c4ff 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  margin-bottom:14px; line-height:1.3;
}
.hero p{ font-size:16px; color:var(--text2); max-width:540px; margin:0 auto; }
.hero .tag{
  margin-top:26px; display:inline-block;
  font-family:var(--mono); font-size:12.5px; color:var(--text3);
  border:1px dashed var(--border2); border-radius:8px; padding:8px 16px;
}

/* ── SECTION SHELL ────────────────────────────────────── */
section{ padding:56px 0; border-top:1px solid var(--border); }
.eyebrow{
  font-family:var(--mono); font-size:11.5px; font-weight:600;
  color:var(--g); letter-spacing:2px; text-transform:uppercase;
  margin-bottom:12px;
}
h2{ font-size:26px; font-weight:700; margin-bottom:16px; letter-spacing:-.3px; }
.lead{ color:var(--text2); font-size:15px; max-width:600px; margin-bottom:32px; }

/* ── PROBLEM: before/after ────────────────────────────── */
.compare{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.compare-card{
  background:var(--bg3); border:1px solid var(--border); border-radius:14px;
  padding:20px; position:relative; overflow:hidden;
}
.compare-card .lbl{
  font-family:var(--mono); font-size:10.5px; font-weight:600;
  letter-spacing:1.5px; text-transform:uppercase; margin-bottom:14px;
  display:flex; align-items:center; gap:6px;
}
.compare-card.bad .lbl{ color:var(--text3); }
.compare-card.bad .lbl::before{ content:'✕'; color:#ff6b6b; }
.compare-card.good .lbl{ color:var(--g); }
.compare-card.good .lbl::before{ content:'✓'; }
.compare-card.good{ border-color:#3ecf8e33; background:#3ecf8e08; }
.sample-text{
  font-size:14.5px; line-height:1.9; color:var(--text2);
  padding:14px 16px; background:var(--bg); border-radius:8px;
  border:1px solid var(--border);
}
.compare-card.bad .sample-text{ direction:ltr; text-align:left; unicode-bidi:normal; }
.compare-card.good .sample-text{ direction:rtl; text-align:right; unicode-bidi:embed; }
@media (max-width:640px){ .compare{ grid-template-columns:1fr; } }

/* ── FEATURES ──────────────────────────────────────────── */
.feat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.feat{ background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:18px 20px; }
.feat .ic{ font-size:20px; margin-bottom:10px; display:block; }
.feat h3{ font-size:14.5px; font-weight:700; margin-bottom:6px; }
.feat p{ font-size:12.5px; color:var(--text3); line-height:1.6; }
@media (max-width:640px){ .feat-grid{ grid-template-columns:1fr; } }

/* ── SITES ─────────────────────────────────────────────── */
.sites-row{ display:flex; flex-wrap:wrap; gap:10px; }
.site-chip{
  display:flex; align-items:center; gap:8px; padding:9px 16px; border-radius:24px;
  background:var(--bg3); border:1px solid var(--border); font-size:13px; color:var(--text2);
}
.site-chip .ic{ font-size:15px; display:flex; align-items:center; justify-content:center; }

/* ── INSTALL STEPS ─────────────────────────────────────── */
.steps{ counter-reset:step; }
.step{ display:flex; gap:20px; padding:22px 0; border-bottom:1px solid var(--border); }
.step:last-child{ border-bottom:none; }
.step-num{
  counter-increment:step; flex-shrink:0; width:38px; height:38px; border-radius:10px;
  background:linear-gradient(135deg,var(--p),var(--g));
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-weight:700; font-size:15px; color:#fff;
}
.step-num::before{ content:counter(step); }
.step-body h3{ font-size:15.5px; font-weight:700; margin-bottom:6px; }
.step-body p{ font-size:13.5px; color:var(--text2); }
.step-body code{
  font-family:var(--mono); font-size:12.5px; color:#c9c4ff;
  background:#7c6fff18; padding:2px 8px; border-radius:5px;
  display:inline-block; margin-top:6px; direction:ltr; unicode-bidi:plaintext;
}

/* ── TOGGLE PREVIEW ────────────────────────────────────── */
.toggle-demo{
  display:flex; align-items:center; gap:14px;
  background:var(--bg3); border:1px solid #3ecf8e33; border-radius:12px;
  padding:16px 20px; margin-top:20px;
}
.toggle-demo .status-dot{
  width:10px; height:10px; border-radius:50%; background:var(--g);
  box-shadow:0 0 8px #3ecf8e88; flex-shrink:0; margin-top:4px;
}
.toggle-demo strong{ color:var(--g); }

/* ── FAQ ───────────────────────────────────────────────── */
.faq-item{ padding:18px 0; border-bottom:1px solid var(--border); }
.faq-item:last-child{ border-bottom:none; }
.faq-item h3{ font-size:14.5px; font-weight:700; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.faq-item h3::before{ content:'؟'; color:var(--p); font-weight:800; }
html[lang="en"] .faq-item h3::before{ content:'?'; }
.faq-item p{ font-size:13.5px; color:var(--text2); }
html[dir="rtl"] .faq-item p{ margin-right:24px; }
html[dir="ltr"] .faq-item p{ margin-left:24px; }

/* ── UPDATE REQUEST ────────────────────────────────────── */
.update-box{
  background:linear-gradient(135deg,#7c6fff10,#3ecf8e08);
  border:1px solid #7c6fff2e; border-radius:16px; padding:32px; text-align:center;
}
.update-box h2{ margin-bottom:10px; }
.update-box p{ color:var(--text2); font-size:14px; margin-bottom:24px; max-width:460px; margin-left:auto; margin-right:auto; }
.mail-btn{
  display:inline-flex; align-items:center; gap:8px; padding:13px 28px; border-radius:10px;
  text-decoration:none; background:linear-gradient(135deg,var(--p),var(--p2)); color:#fff;
  font-weight:600; font-size:14px; box-shadow:0 10px 30px -8px #7c6fff66;
}
.privacy-note{ margin-top:18px; font-size:11.5px; color:var(--text3); display:flex; align-items:center; justify-content:center; gap:6px; }

/* ── FOOTER ────────────────────────────────────────────── */
footer{ padding:50px 0 60px; text-align:center; }
.f-logo{
  width:44px; height:44px; margin:0 auto 14px; border-radius:11px;
  background:linear-gradient(135deg,var(--p),var(--g));
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-weight:800; color:#fff; font-size:16px;
}
footer .name{ font-size:15px; font-weight:700; margin-bottom:4px; }
footer a{ color:var(--g); text-decoration:none; font-size:13px; }
footer .ver{ margin-top:16px; font-size:11px; color:var(--text3); font-family:var(--mono); }

.cta-line{
  margin-top:22px; font-size:13.5px; color:var(--text2);
  max-width:380px; margin-left:auto; margin-right:auto; line-height:1.7;
}
.footer-contact{ margin-top:10px; font-size:12px; }
.footer-contact .sig{ color:var(--text); font-weight:600; }
.footer-contact a{ color:var(--g); font-size:12px; }

.authenticity{
  margin-top:26px; padding-top:22px; border-top:1px solid var(--border);
  display:flex; flex-direction:column; align-items:center; gap:8px;
}
.authenticity img{ width:52px; height:52px; border-radius:50%; opacity:.95; }
.authenticity .note{ font-size:10.5px; color:var(--text3); max-width:300px; line-height:1.6; }

/* Social row — typographic monogram badges, no logo reproduction */
.social-row{
  display:flex; flex-wrap:wrap; justify-content:center; gap:8px;
  margin-top:16px;
}
.social-chip{
  display:flex; align-items:center; gap:7px; padding:6px 13px 6px 8px; border-radius:20px;
  background:var(--bg3); border:1px solid var(--border); font-size:11.5px;
  color:var(--text2); text-decoration:none; transition:all .15s;
}
.social-chip:hover{
  border-color:#7c6fff55; color:#fff;
  background:linear-gradient(135deg,#7c6fff1c,#3ecf8e12);
}
.social-mono{
  width:19px; height:19px; border-radius:6px; flex-shrink:0;
  background:linear-gradient(135deg,var(--p),var(--g));
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:8.5px; font-weight:700; color:#fff;
}
</style>
</head>

<div class="lang-bar">
  <div class="lang-pills">

</div>

</div>

      </div>
    </div>
    <p style="margin-top:14px;font-size:11.5px;color:var(--text3);" data-i18n="problem.caption"></p>
  </div>
</section>

<section>
  <div class="wrap">

function get(obj, path) {
  return path.split(".").reduce((o, k) => (o ? o[k] : undefined), obj);
}

function renderDynamicLists(dict) {
  // Before/after demo — same text in both boxes, CSS makes the difference real
  document.getElementById("badText").textContent = dict.problem.demoText;
  document.getElementById("goodText").textContent = dict.problem.demoText;

  const featGrid = document.getElementById("featGrid");
  featGrid.innerHTML = dict.features.items.map(([ic, title, desc]) => `
    <div class="feat">
      <span class="ic">${ic}</span>
      <h3>${title}</h3>
      <p>${desc}</p>
    </div>
  `).join("");

  const stepsList = document.getElementById("stepsList");
  stepsList.innerHTML = dict.install.steps.map(([title, body]) => `
    <div class="step">
      <div class="step-num"></div>
      <div class="step-body">
        <h3>${title}</h3>
        <p>${body}</p>
      </div>
    </div>
  `).join("");

  const faqList = document.getElementById("faqList");
  faqList.innerHTML = dict.faq.items.map(([q, a]) => `
    <div class="faq-item">
      <h3>${q}</h3>
      <p>${a}</p>
    </div>
  `).join("");
}

function applyLang(lang) {
  const dict = I18N[lang];
  if (!dict) return;

  localStorage.setItem("pgGuideLang", lang);

  const html = document.getElementById("htmlRoot");
  html.lang = lang;
  html.dir = lang === "en" ? "ltr" : "rtl";

  document.querySelectorAll(".lang-pill").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === lang);
  });

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const val = get(dict, el.dataset.i18n);
    if (typeof val === "string") el.innerHTML = val;
  });

  renderDynamicLists(dict);

  const mailBtn = document.getElementById("mailBtn");
  const subj = encodeURIComponent(dict.update.subject);
  const bod  = encodeURIComponent(dict.update.body);
  mailBtn.href = `mailto:paragraphic@gmail.com?subject=${subj}&body=${bod}`;
}

document.querySelectorAll(".lang-pill").forEach(btn => {
  btn.addEventListener("click", () => applyLang(btn.dataset.lang));
});

(function initLang() {
  const saved = localStorage.getItem("pgGuideLang");
  if (saved && I18N[saved]) { applyLang(saved); return; }

  const nav = (navigator.language || "fa").toLowerCase();
  if (nav.startsWith("ar")) applyLang("ar");
  else if (nav.startsWith("en")) applyLang("en");
  else applyLang("fa");
})();
</script>
